name: Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '*.json'

concurrency:
  group: "release"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: |
        mkdir -p "${RUNNER_TEMP}/keystore"
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${RUNNER_TEMP}/keystore/prerelease_keystore.keystore"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Run Gradle
      run: ./gradlew assembleStableRelease
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        MAL_KEY: ${{ secrets.MAL_KEY }}
        ANILIST_KEY: ${{ secrets.ANILIST_KEY }}

    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'versionName' gradle/libs.versions.toml | cut -d'"' -f2)
        echo "version=v$VERSION" >> $GITHUB_OUTPUT

    - name: Create release
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: ${{ steps.version.outputs.version }}
        prerelease: false
        title: "Release ${{ steps.version.outputs.version }}"
        files: |
          app/build/outputs/apk/stable/release/*.apk